name: Build and Push Docker Image

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Required for multi-platform (arm64) emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            sekolahcode/devpulse-server:latest
            sekolahcode/devpulse-server:${{ github.sha }}
          # SQLx compile-time query verification requires either a live DB or
          # the .sqlx offline cache committed to the repo. Set SQLX_OFFLINE=true
          # so the Rust build uses the cached query metadata.
          build-args: |
            SQLX_OFFLINE=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
